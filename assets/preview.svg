<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" viewBox="0 0 700 280">
  <style>
    .t { font-family: SF Mono, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    .dim { fill: #64748b; }
    .cyan { fill: #22d3ee; }
    .green { fill: #4ade80; }
    .yellow { fill: #facc15; }
    .white { fill: #e2e8f0; }
    .magenta { fill: #c084fc; }
    .gray { fill: #94a3b8; }
    .blue { fill: #60a5fa; }
    .red { fill: #f87171; }
  </style>
  <!-- Window chrome -->
  <rect width="700" height="280" rx="10" fill="#0f172a"/>
  <rect width="700" height="36" rx="10" fill="#1e293b"/>
  <rect y="26" width="700" height="10" fill="#1e293b"/>
  <circle cx="20" cy="18" r="6" fill="#ef4444"/>
  <circle cx="40" cy="18" r="6" fill="#eab308"/>
  <circle cx="60" cy="18" r="6" fill="#22c55e"/>
  <text x="350" y="22" text-anchor="middle" class="t dim" font-size="12">Preview</text>

  <!-- Preview box -->
  <rect x="30" y="55" width="640" height="48" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="68" class="t dim" font-size="11">Preview</text>
  <text x="50" y="88" class="t white" font-size="14">
    <tspan class="cyan">claude-sonnet-4-5</tspan>
    <tspan class="dim"> │ </tspan>
    <tspan class="green">42%</tspan>
    <tspan class="dim"> │ </tspan>
    <tspan class="green">$0.023</tspan>
    <tspan class="dim"> │ </tspan>
    <tspan class="cyan">⎇ main</tspan>
  </text>

  <!-- Success messages -->
  <text x="20" y="130" class="t white">│</text>
  <text x="20" y="150" class="t green">◇  Save this configuration?</text>
  <text x="20" y="170" class="t dim">│  Yes</text>
  <text x="20" y="190" class="t white">│</text>

  <text x="20" y="210" class="t green">◆  Script: ~/.claude/statusline.sh</text>
  <text x="20" y="230" class="t green">◆  Settings: ~/.claude/settings.json</text>
  <text x="20" y="250" class="t white">│</text>
  <text x="20" y="268" class="t cyan">└  Made with statuscraft</text>
</svg>
